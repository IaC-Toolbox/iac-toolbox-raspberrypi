---
# Platform abstraction variables
# These variables provide cross-platform compatibility by mapping Ansible facts
# to the appropriate package manager, service manager, and architecture conventions.

# Hexagonal architecture: OS abstraction variables
# Used by the package and service_ctl port roles to dispatch to the correct adapter.
package_manager: "{{ ansible_pkg_mgr }}"
service_manager: "{{ ansible_service_mgr }}"

# Architecture Selection
# Maps Ansible's architecture facts to the conventions used by various tools.
# cloudflared uses: amd64/arm64
# GitHub Actions runner uses: x64/arm64
cloudflared_arch: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
runner_arch: "{{ ansible_architecture | replace('x86_64', 'x64') | replace('aarch64', 'arm64') }}"
