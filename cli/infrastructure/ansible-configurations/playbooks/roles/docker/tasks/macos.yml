---
- name: Check if docker is already installed
  command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker Desktop via brew cask
  community.general.homebrew_cask:
    name: docker
    state: present
  when: docker_check.rc != 0

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false
  retries: 5
  delay: 3

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"

- name: Check if Docker daemon is running
  command: docker info
  register: docker_daemon_check
  changed_when: false
  failed_when: false

- name: Start Docker Desktop if daemon is not running
  command: open -a Docker
  when: docker_daemon_check.rc != 0

- name: Detect Rancher Desktop Docker socket
  stat:
    path: "{{ ansible_env.HOME }}/.rd/docker.sock"
  register: rancher_socket

- name: Detect Docker Desktop socket
  stat:
    path: "{{ ansible_env.HOME }}/.docker/run/docker.sock"
  register: docker_desktop_socket

- name: Set active Docker socket fact
  set_fact:
    active_docker_socket: >-
      {{ 'unix://' + ansible_env.HOME + '/.rd/docker.sock'
         if rancher_socket.stat.exists and rancher_socket.stat.issock
         else 'unix://' + ansible_env.HOME + '/.docker/run/docker.sock' }}
  when: >
    (rancher_socket.stat.exists and rancher_socket.stat.issock) or
    (docker_desktop_socket.stat.exists and docker_desktop_socket.stat.issock)

- name: Wait for Docker daemon to be ready
  command: docker info
  register: docker_daemon_wait
  retries: 30
  delay: 2
  until: docker_daemon_wait.rc == 0
  changed_when: false
  when: docker_daemon_check.rc != 0
