---
- name: Create Terraform destination directory
  ansible.builtin.file:
    path: "{{ threshold_alerts_terraform_dest }}/modules/threshold_alert"
    state: directory
    mode: '0755'

- name: Render providers.tf
  ansible.builtin.template:
    src: providers.tf.j2
    dest: "{{ threshold_alerts_terraform_dest }}/providers.tf"

- name: Render variables.tf
  ansible.builtin.template:
    src: variables.tf.j2
    dest: "{{ threshold_alerts_terraform_dest }}/variables.tf"

- name: Render terraform.tfvars
  ansible.builtin.template:
    src: terraform.tfvars.j2
    dest: "{{ threshold_alerts_terraform_dest }}/terraform.tfvars"
    mode: '0600'

- name: Render main.tf (alert rule modules)
  ansible.builtin.template:
    src: main.tf.j2
    dest: "{{ threshold_alerts_terraform_dest }}/main.tf"

- name: Render threshold_alert module
  ansible.builtin.template:
    src: modules/threshold_alert/main.tf.j2
    dest: "{{ threshold_alerts_terraform_dest }}/modules/threshold_alert/main.tf"

- name: Ensure terraform.tfvars is in .gitignore
  ansible.builtin.lineinfile:
    path: "{{ threshold_alerts_terraform_dest }}/.gitignore"
    line: "terraform.tfvars"
    create: true
    mode: '0644'

- name: Terraform init
  ansible.builtin.command:
    cmd: terraform init
    chdir: "{{ threshold_alerts_terraform_dest }}"
  changed_when: false

- name: Terraform apply
  ansible.builtin.command:
    cmd: terraform apply -auto-approve
    chdir: "{{ threshold_alerts_terraform_dest }}"
  changed_when: true
