# Resolved at play time from grafana_alloy.instance_name or ansible_hostname
threshold_alerts_instance: "{{ grafana_alloy.instance_name | default(ansible_hostname) }}"

# Destination where Terraform files are rendered on the control machine
threshold_alerts_terraform_dest: "{{ threshold_alerts.threshold_alerts_terraform_dest }}/terraform/grafana-alerts/"

# Threshold defaults — override per device in iac-toolbox.yml
threshold_alerts_memory_critical: "{{ threshold_alerts.memory_critical_threshold | default(95) }}"
threshold_alerts_cpu_critical:    "{{ threshold_alerts.cpu_critical_threshold    | default(90) }}"
threshold_alerts_disk_critical:   "{{ threshold_alerts.disk_critical_threshold   | default(90) }}"
