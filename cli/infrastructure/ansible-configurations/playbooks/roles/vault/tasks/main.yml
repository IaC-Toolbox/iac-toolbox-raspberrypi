---
- name: Create vault base directory
  file:
    path: "{{ vault.base_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Create vault config and scripts directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - "{{ vault.base_dir }}/config"
    - "{{ vault.base_dir }}/scripts"

- name: Create vault logs directory with vault user ownership
  file:
    path: "{{ vault.base_dir }}/logs"
    state: directory
    owner: "{{ '100' if ansible_facts['system'] == 'Linux' else omit }}"
    group: "{{ '1000' if ansible_facts['system'] == 'Linux' else omit }}"
    mode: '0755'

- name: Create vault data directory with restricted permissions
  file:
    path: "{{ vault.base_dir }}/data"
    state: directory
    owner: "{{ '100' if ansible_facts['system'] == 'Linux' else omit }}"
    group: "{{ '1000' if ansible_facts['system'] == 'Linux' else omit }}"
    mode: '0755'

- name: Deploy vault configuration
  template:
    src: vault.hcl.j2
    dest: "{{ vault.base_dir }}/config/vault.hcl"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy docker-compose configuration
  template:
    src: docker-compose.yml.j2
    dest: "{{ vault.base_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy auto-unseal script
  template:
    src: auto-unseal.sh.j2
    dest: "{{ vault.base_dir }}/scripts/auto-unseal.sh"
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Start vault container
  community.docker.docker_compose_v2:
    project_src: "{{ vault.base_dir }}"
    state: present
    pull: always
  become_user: "{{ ansible_user }}"

- name: Wait for vault health check
  shell: docker inspect --format='{% raw %}{{.State.Health.Status}}{% endraw %}' vault
  register: vault_health
  retries: 30
  delay: 2
  until: vault_health.stdout == "healthy"
  changed_when: false

- name: Run vault initialization helper
  shell: |
    cd {{ vault.base_dir }}
    docker compose --profile unseal run --rm vault-unsealer
  become_user: "{{ ansible_user }}"
  register: vault_init_helper
  failed_when: vault_init_helper.rc != 0 and vault_init_helper.rc != 2
  changed_when: "'Initializing Vault' in vault_init_helper.stdout"

- name: Display vault initialization helper output
  debug:
    msg: "{{ vault_init_helper.stdout_lines }}"

- name: Wait for vault-init.json to exist
  stat:
    path: "{{ vault.base_dir }}/data/vault-init.json"
  register: vault_init_file
  retries: 10
  delay: 2
  until:
    - vault_init_file.stat.exists
    - vault_init_file.stat.size > 0

- name: Set vault-init.json permissions for ansible user
  file:
    path: "{{ vault.base_dir }}/data/vault-init.json"
    owner: "{{ ansible_user }}"
    mode: '0600'

- name: Read vault-init.json file
  slurp:
    src: "{{ vault.base_dir }}/data/vault-init.json"
  register: vault_init_content

- name: Parse vault initialization data
  set_fact:
    vault_init_data: "{{ vault_init_content.content | b64decode | from_json }}"
    vault_root_token: "{{ (vault_init_content.content | b64decode | from_json).root_token }}"
    vault_unseal_key: "{{ (vault_init_content.content | b64decode | from_json).unseal_keys_b64[0] }}"

- name: Display Vault access information
  debug:
    msg:
      - "=========================================="
      - "HashiCorp Vault has been successfully deployed!"
      - "=========================================="
      - "Access URL: https://vault.iac-toolbox.com"
      - "Root Token: {{ vault_root_token }}"
      - ""
      - "IMPORTANT: Save these credentials securely!"
      - "Unseal Key: {{ vault_unseal_key }}"
      - ""
      - "Vault initialization details saved to: {{ vault.base_dir }}/data/vault-init.json"

- name: Check current Vault status as JSON
  shell: docker exec vault vault status -format=json
  register: vault_status_check
  failed_when: vault_status_check.rc not in [0, 2]
  changed_when: false

- name: Parse vault status
  set_fact:
    vault_is_initialized: "{{ (vault_status_check.stdout | from_json).initialized }}"
    vault_is_sealed: "{{ (vault_status_check.stdout | from_json).sealed }}"

- name: Unseal Vault if sealed
  shell: docker exec vault vault operator unseal "{{ vault_unseal_key }}"
  register: unseal_result
  changed_when: false
  when: vault_is_sealed | bool

- name: Wait until Vault is unsealed
  shell: docker exec vault vault status -format=json
  register: vault_status_after_unseal
  retries: 10
  delay: 2
  until: not ((vault_status_after_unseal.stdout | from_json).sealed)
  changed_when: false

- name: Display vault status
  debug:
    msg: "{{ vault_status_after_unseal.stdout | from_json }}"

- name: Enable KV secrets engine
  shell: |
    docker exec -e VAULT_TOKEN={{ vault_root_token }} vault \
      vault secrets enable -version=2 -path=kv kv
  register: kv_enable
  failed_when:
    - kv_enable.rc != 0
    - "'path is already in use' not in kv_enable.stderr"
  changed_when: "'path is already in use' not in kv_enable.stderr"
  when: vault.enable_kv

- name: Enable audit logging
  shell: |
    docker exec -e VAULT_TOKEN={{ vault_root_token }} vault \
      vault audit enable file file_path=/vault/logs/audit.log
  register: audit_enable
  failed_when:
    - audit_enable.rc != 0
    - "'path already in use' not in audit_enable.stderr"
  changed_when: "'path already in use' not in audit_enable.stderr"
  when: vault.enable_audit

- name: Create vault systemd service
  template:
    src: vault.service.j2
    dest: /etc/systemd/system/vault.service
    mode: '0644'
  notify: Reload systemd
  when: ansible_service_mgr == "systemd"

- name: Create vault-unseal systemd service
  template:
    src: vault-unseal.service.j2
    dest: /etc/systemd/system/vault-unseal.service
    mode: '0644'
  notify: Reload systemd
  when: ansible_service_mgr == "systemd"

- name: Enable vault systemd service
  include_role:
    name: service_ctl
  vars:
    svc_name: vault
    svc_action: started
    svc_enabled: true
  when: ansible_service_mgr == "systemd"

- name: Enable vault-unseal systemd service
  include_role:
    name: service_ctl
  vars:
    svc_name: vault-unseal
    svc_action: started
    svc_enabled: true
  when: ansible_service_mgr == "systemd"
