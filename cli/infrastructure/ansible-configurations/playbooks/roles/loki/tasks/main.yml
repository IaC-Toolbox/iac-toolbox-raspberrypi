---
- name: Create Loki base directory
  file:
    path: "{{ loki.base_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Deploy Loki configuration
  template:
    src: loki-config.yml.j2
    dest: "{{ loki.base_dir }}/loki-config.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy Alloy configuration
  template:
    src: alloy-config.alloy.j2
    dest: "{{ loki.base_dir }}/alloy-config.alloy"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy docker-compose configuration
  template:
    src: docker-compose.yml.j2
    dest: "{{ loki.base_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Pull Loki container image
  community.docker.docker_image:
    name: "grafana/loki:{{ loki.version }}"
    source: pull
  become_user: "{{ ansible_user }}"

- name: Pull Alloy container image
  community.docker.docker_image:
    name: "grafana/alloy:{{ alloy.version }}"
    source: pull
  become_user: "{{ ansible_user }}"

- name: Deploy Loki systemd service
  template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: '0644'
  notify: Reload systemd
  when: ansible_service_mgr == "systemd"

- name: Enable and start Loki service
  include_role:
    name: service_ctl
  vars:
    svc_name: loki
    svc_action: started
    svc_enabled: true
  when: ansible_service_mgr == "systemd"

- name: Wait for Loki to be ready
  uri:
    url: "http://localhost:{{ loki.port }}/ready"
    method: GET
    status_code: 200
  register: loki_health
  retries: 30
  delay: 2
  until: loki_health.status == 200

- name: Wait for Alloy to start
  pause:
    seconds: 10

- name: Check if Loki datasource exists in Grafana
  uri:
    url: "http://localhost:{{ grafana.port }}/api/datasources/name/Loki"
    user: "{{ grafana.admin_user }}"
    password: "{{ grafana.admin_password }}"
    force_basic_auth: yes
    status_code: [200, 404]
  register: loki_datasource_check
  failed_when: false

- name: Create Loki datasource in Grafana
  uri:
    url: "http://localhost:{{ grafana.port }}/api/datasources"
    method: POST
    user: "{{ grafana.admin_user }}"
    password: "{{ grafana.admin_password }}"
    body_format: json
    body:
      name: "Loki"
      type: "loki"
      url: "http://loki:{{ loki.port }}"
      access: "proxy"
      jsonData:
        maxLines: 1000
    force_basic_auth: yes
    status_code: 200
  when: loki_datasource_check.status == 404
  register: loki_datasource_created

- name: Display datasource creation message
  debug:
    msg: "Loki datasource has been created in Grafana"
  when: loki_datasource_created is changed

- name: Get Loki Log Dashboard JSON from Grafana.com
  uri:
    url: "https://grafana.com/api/dashboards/13639"
    method: GET
    return_content: yes
  register: loki_dashboard_json

- name: Import Loki Log Dashboard
  uri:
    url: "http://localhost:{{ grafana.port }}/api/dashboards/import"
    method: POST
    user: "{{ grafana.admin_user }}"
    password: "{{ grafana.admin_password }}"
    body_format: json
    body:
      dashboard: "{{ loki_dashboard_json.json.json }}"
      overwrite: true
      inputs:
        - name: "DS_LOKI"
          type: "datasource"
          pluginId: "loki"
          value: "Loki"
    force_basic_auth: yes
    status_code: 200
  register: dashboard_imported

- name: Display dashboard import message
  debug:
    msg: "Loki dashboard imported at: http://localhost:{{ grafana.port }}{{ dashboard_imported.json.importedUrl }}"
  when: dashboard_imported is changed

- name: Display Loki access information
  debug:
    msg:
      - "=========================================="
      - "Loki stack has been successfully deployed!"
      - "=========================================="
      - "Loki API: http://{{ ansible_host }}:{{ loki.port }}"
      - "Alloy UI: http://{{ ansible_host }}:{{ alloy.port }}"
      - ""
      - "Grafana datasource: Loki (auto-configured)"
      - "Dashboard: Loki Logs (auto-imported)"
      - ""
      - "Query logs in Grafana Explore:"
      - "  - systemd: {job=\"systemd\"}"
      - "  - Docker: {job=\"docker\"}"
      - "  - Auth: {job=\"auth\"}"
      - ""
      - "Log retention: {{ loki.retention_hours }} hours"
      - ""
      - "Alloy UI (remote): https://{{ alloy.domain }}"
      - "  (Available after Cloudflare tunnel configured)"
