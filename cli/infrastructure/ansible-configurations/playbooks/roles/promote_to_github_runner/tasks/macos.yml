---
- name: Validate GitHub runner repo URL is provided
  fail:
    msg: "Missing required variable: github_runner.repo_url (set via GITHUB_REPO_URL environment variable)"
  when: github_runner.repo_url is not defined or github_runner.repo_url == ''

- name: Validate GitHub runner token is provided
  fail:
    msg: "Missing required variable: github_runner.token (set via GITHUB_RUNNER_TOKEN environment variable)"
  when: github_runner.token is not defined or github_runner.token == ''

- name: Create runner directory
  file:
    path: "{{ github_runner.work_dir }}"
    state: directory
    mode: '0755'

- name: Download GitHub Actions runner tarball (macOS)
  get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner.version }}/actions-runner-osx-x64-{{ github_runner.version }}.tar.gz"
    dest: "{{ github_runner.work_dir }}/actions-runner.tar.gz"
    mode: '0644'

- name: Extract GitHub Actions runner
  unarchive:
    src: "{{ github_runner.work_dir }}/actions-runner.tar.gz"
    dest: "{{ github_runner.work_dir }}"
    remote_src: yes
    creates: "{{ github_runner.work_dir }}/config.sh"

- name: Check if runner is already configured
  stat:
    path: "{{ github_runner.work_dir }}/.runner"
  register: runner_configured

- name: Configure GitHub Actions runner
  shell: |
    ./config.sh --unattended \
      --url {{ github_runner.repo_url }} \
      --token {{ github_runner.token }} \
      --labels {{ github_runner.labels }} \
      --work _work
  args:
    chdir: "{{ github_runner.work_dir }}"
  when: not runner_configured.stat.exists
  register: config_output

- name: Display runner configuration result
  debug:
    msg: "Runner configured successfully"
  when: config_output is changed

- name: Install runner as launchd service
  shell: ./svc.sh install
  args:
    chdir: "{{ github_runner.work_dir }}"
  when: not runner_configured.stat.exists

- name: Start runner service
  shell: ./svc.sh start
  args:
    chdir: "{{ github_runner.work_dir }}"
  when: not runner_configured.stat.exists
