---
- name: Setup IaC Toolbox Infrastructure
  hosts: all
  become: false
  pre_tasks:
    - name: Validate connection to target host
      ping:
      tags: always

    - name: Check Python installation
      command: python3 --version
      register: python_version
      changed_when: false
      tags: always

    - name: Display Python version
      debug:
        msg: "Python {{ python_version.stdout }} is installed"
      tags: always

    - name: Verify required variables are defined
      assert:
        that:
          - ansible_host is defined
          - ansible_user is defined
        fail_msg: "Required connection variables are missing. Check inventory configuration."
      tags: always

    - name: Gather system facts
      setup:
      tags: always

    - name: Display target system information
      debug:
        msg: |
          Target: {{ ansible_host }}
          User: {{ ansible_user }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
      tags: always

    - name: Display selected deployment configuration
      debug:
        msg:
          target: "{{ ansible_host | default('local') }}"
          connection: "{{ ansible_connection | default('ssh') }}"
          vault_enabled: "{{ vault.enabled | default(false) }}"
          loki_enabled: "{{ loki.enabled | default(false) }}"
      tags: always

  roles:
    - role: common
      tags: [always]

    - role: setup
      tags: [setup, base]
      when:
        - (setup is not defined or setup)
        - ansible_os_family != "Darwin"

    - role: docker
      tags: [docker]
      when: docker is not defined or docker.enabled

    - role: vault
      tags: [vault, secrets]
      when: vault is defined and vault.enabled

    - role: grafana
      tags: [grafana, monitoring]
      when: grafana is defined and grafana.enabled

    - role: prometheus
      tags: [prometheus, monitoring]
      when: prometheus is defined and prometheus.enabled

    - role: loki
      tags: [loki, logs, monitoring]
      when: loki is defined and loki.enabled

    - role: cloudflare-tunnel
      tags: [cloudflare, tunnel]
      when:
        - cloudflare is defined
        - cloudflare.enabled
        - (cloudflare.mode | default('oauth')) == 'oauth'

    - role: cloudflare-tunnel-api
      tags: [cloudflare, tunnel]
      when:
        - cloudflare is defined
        - cloudflare.enabled
        - (cloudflare.mode | default('oauth')) == 'api'

    - role: github-build-workflow
      tags: [github-build-workflow, ci]
      when: github_build_workflow is defined and github_build_workflow.enabled

    # - role: promote_to_github_runner
    #   tags: [github-runner, runner]
    #   when: github_runner is defined and github_runner.enabled

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          ========================================
          IaC Toolbox setup completed successfully!
          ========================================

          Next steps:
          {% if vault is defined and vault.enabled %}
          - Verify Vault: sudo systemctl status vault
          - Access Vault UI: https://vault.iac-toolbox.com
          - Check credentials: cat {{ vault.base_dir }}/data/vault-init.json
          {% endif %}
          {% if grafana is defined and grafana.enabled %}
          - Verify Grafana: sudo systemctl status grafana
          - Access Grafana UI: https://{{ grafana.domain }}
          - Username: {{ grafana.admin_user }} / Password: {{ grafana.admin_password }}
          {% endif %}
          {% if prometheus is defined and prometheus.enabled %}
          - Verify Prometheus: sudo systemctl status prometheus
          - Prometheus UI (via SSH tunnel): ssh -L {{ prometheus.port }}:localhost:{{ prometheus.port }} {{ ansible_user }}@{{ ansible_host }}
          - Node Exporter metrics: http://{{ ansible_host }}:{{ node_exporter.port | default(9100) }}/metrics
          - Grafana datasource: Prometheus (auto-configured)
          - Dashboard: Node Exporter Full (auto-imported)
          {% endif %}
          {% if loki is defined and loki.enabled %}
          - Verify Loki: sudo systemctl status loki
          - Loki API: http://{{ ansible_host }}:{{ loki.port }}
          - Alloy UI: https://{{ alloy.domain | default('') }}
          - Grafana datasource: Loki (auto-configured)
          - Dashboard: Loki Logs (auto-imported)
          - Query logs: {job="systemd"}, {job="docker"}, {job="auth"}
          {% endif %}
          {% if cloudflare is defined and cloudflare.enabled %}
          - Verify Cloudflare tunnel: sudo systemctl status cloudflared
          {% endif %}
          {% if github_runner is defined and github_runner.enabled %}
          - Verify GitHub runner: sudo systemctl status actions.runner.*
          {% endif %}
          - Check Docker: docker --version

          Your IaC Toolbox target is ready for deployment!
      tags: always
