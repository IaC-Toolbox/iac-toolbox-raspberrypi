---
# ============================================
# IaC Toolbox - Observability Platform Playbook
# ============================================
# Deploys the full observability stack in a single Ansible run.
# common runs once; all service roles are gated by their when conditions.
#
# Deploy order (dependency order):
#   common → node_exporter → grafana-alloy → prometheus → cadvisor → grafana → cloudflare (optional)
#
# Flags driven by iac-toolbox.yml (passed via --extra-vars):
#   cloudflare.enabled: true   — deploy Cloudflare tunnel (default: skip)
#   cadvisor.enabled: false    — skip cAdvisor (default: deploy)

- import_playbook: common.yml

- name: Deploy Observability Platform
  hosts: all
  become: false
  roles:
    - role: node_exporter
      when: node_exporter is defined and node_exporter.enabled

    - role: grafana-alloy
      when: grafana_alloy is defined and grafana_alloy.enabled

    - role: prometheus
      when: prometheus is defined and prometheus.enabled

    - role: cadvisor
      when: cadvisor is not defined or cadvisor.enabled | default(true)

    - role: grafana
      when: grafana is defined and grafana.enabled

    - role: cloudflare-tunnel
      when:
        - cloudflare is defined
        - cloudflare.enabled | default(false)
        - (cloudflare.mode | default('oauth')) == 'oauth'

    - role: cloudflare-tunnel-api
      when:
        - cloudflare is defined
        - cloudflare.enabled | default(false)
        - (cloudflare.mode | default('oauth')) == 'api'
