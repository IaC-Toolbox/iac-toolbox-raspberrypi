---
# ============================================
# IaC Toolbox - Metrics Agent Playbook
# ============================================
# Deploys Node Exporter + cAdvisor + Grafana Alloy + Alerts.

- import_playbook: common.yml

- name: Deploy Metrics Agents
  hosts: all
  become: false
  roles:
    - role: node_exporter
      when: node_exporter is defined and node_exporter.enabled

    - role: grafana-alloy
      when: grafana_alloy is defined and grafana_alloy.enabled

    - role: cadvisor
      when: cadvisor is not defined or cadvisor.enabled | default(true)

    - role: threshold-alerts
      when: threshold_alerts is defined and threshold_alerts.enabled | default(false)
