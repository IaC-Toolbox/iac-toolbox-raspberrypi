# Generated by iac-toolbox init
# Safe to commit — no secrets stored here

device:
  profile: "app-server"

docker:
  enabled: true # always installed, not configurable

github_build_workflow:
  enabled: true
  docker_hub_username: "vvasylkovskyi1"
  docker_image_name: "vvasylkovskyi1/iac-toolbox-cli"
  docker_hub_token: "{{ docker_hub_token }}" # injected by CLI at deploy time

github_runner:
  enabled: false # coming soon

cloudflare:
  enabled: false # coming soon

vault:
  enabled: false # coming soon

grafana:
  enabled: false # coming soon

prometheus:
  enabled: true
  version: "latest"
  base_dir: "~/.iac-toolbox/observability"
  port: 9090
  scrape_interval: "15s"
  retention: "15d"

loki:
  enabled: false

pagerduty:
  enabled: false # coming soon
