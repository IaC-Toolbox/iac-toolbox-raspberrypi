---
- name: Install docker dependency apt-transport-https
  include_role:
    name: package
  vars:
    pkg_name: apt-transport-https

- name: Install docker dependency ca-certificates
  include_role:
    name: package
  vars:
    pkg_name: ca-certificates

- name: Install docker dependency curl
  include_role:
    name: package
  vars:
    pkg_name: curl

- name: Install docker dependency gnupg
  include_role:
    name: package
  vars:
    pkg_name: gnupg

- name: Install docker dependency lsb-release
  include_role:
    name: package
  vars:
    pkg_name: lsb-release

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

- name: Get Debian release name
  shell: lsb_release -cs
  register: debian_release
  changed_when: false

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=arm64] https://download.docker.com/linux/debian {{ debian_release.stdout }} stable"
    state: present
    filename: docker

- name: Install docker-ce
  include_role:
    name: package
  vars:
    pkg_name: docker-ce

- name: Install docker-ce-cli
  include_role:
    name: package
  vars:
    pkg_name: docker-ce-cli

- name: Install containerd.io
  include_role:
    name: package
  vars:
    pkg_name: containerd.io

- name: Install docker-buildx-plugin
  include_role:
    name: package
  vars:
    pkg_name: docker-buildx-plugin

- name: Install docker-compose-plugin
  include_role:
    name: package
  vars:
    pkg_name: docker-compose-plugin

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Enable and start Docker service
  include_role:
    name: service_ctl
  vars:
    svc_name: docker
    svc_action: started
    svc_enabled: true

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Display Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"

- name: Check if Docker daemon is running
  command: docker info
  register: docker_daemon_check
  changed_when: false
  failed_when: false

- name: Start Docker service if not running
  systemd:
    name: docker
    state: started
    enabled: true
  when: docker_daemon_check.rc != 0
  become: true

- name: Verify Docker daemon is responsive
  command: docker info
  register: docker_daemon_verify
  changed_when: false
