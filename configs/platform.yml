# Example platform config — grafana.iac-toolbox.com
# Safe to commit — no secrets stored here.
# Usage:
#   iac-toolbox init    --filePath ./configs/platform.yml
#   iac-toolbox install --filePath ./configs/platform.yml

type: platform
host: grafana.iac-toolbox.com
ssh_user: ubuntu
secrets_backend: vault

features:
  - monitoring # installs prometheus + grafana
