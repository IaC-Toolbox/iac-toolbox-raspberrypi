# Example app_service config — MacBook (LLM workload)
# Safe to commit — no secrets stored here.
# Usage:
#   iac-toolbox init    --filePath ./configs/macbook.yml
#   iac-toolbox install --filePath ./configs/macbook.yml

type: app_service
host: macbook.local
ssh_user: viktor
secrets_backend: vault

features:
  - monitoring  # installs node_exporter + grafana-alloy
  - llm         # installs ollama + cadvisor
