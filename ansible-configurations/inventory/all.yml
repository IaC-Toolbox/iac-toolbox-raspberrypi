# ============================================
# Ansible Inventory - Config File Based
# ============================================
# Target connection is driven by the `target` section of the config YAML file
# passed via --extra-vars "@<file>". Example:
#
#   target:
#     mode: local          # or: remote
#     host: raspberry-4b.local
#     user: vvasylkovskyi
#     ssh_key: ~/.ssh/raspberrypi-4b

all:
  hosts:
    iac-toolbox-target:
      ansible_connection: "{{ 'local' if (target.mode | default('local')) == 'local' else 'ssh' }}"
      ansible_host: "{{ target.host | default('localhost') }}"
      ansible_user: "{{ target.user | default('pi') }}"
      ansible_ssh_private_key_file: "{{ target.ssh_key | default('~/.ssh/id_ed25519') }}"
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      ansible_python_interpreter: auto_silent
