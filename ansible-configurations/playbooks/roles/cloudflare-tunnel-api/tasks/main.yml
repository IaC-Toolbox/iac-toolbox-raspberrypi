---
- name: Validate Cloudflare API mode inputs
  assert:
    that:
      - cloudflare.account_id is defined
      - cloudflare.account_id | length > 0
      - cloudflare.zone_id is defined
      - cloudflare.zone_id | length > 0
      - lookup('env', 'CLOUDFLARE_API_TOKEN') | length > 0
    fail_msg: "Cloudflare API mode requires cloudflare.account_id, cloudflare.zone_id, and CLOUDFLARE_API_TOKEN"

- name: Set Cloudflare API token fact
  set_fact:
    cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"

- name: Download cloudflared binary
  get_url:
    url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-{{ cloudflared_arch }}"
    dest: /usr/local/bin/cloudflared
    mode: '0755'

- name: Verify cloudflared is executable
  command: cloudflared --version
  register: cloudflared_version
  changed_when: false

- name: Display cloudflared version
  debug:
    msg: "Cloudflared installed: {{ cloudflared_version.stdout }}"

- name: Create .cloudflared directory
  file:
    path: "{{ ansible_env.HOME }}/.iac-toolbox/cloudflared"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Get existing tunnels from Cloudflare API
  uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare.account_id }}/cfd_tunnel"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: true
  register: cloudflare_tunnels

- name: Extract existing tunnel matching configured name
  set_fact:
    existing_tunnel: "{{ (cloudflare_tunnels.json.result | selectattr('name', 'equalto', cloudflare.tunnel_name) | list | first) | default({}) }}"

- name: Create remote-managed tunnel when missing
  uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare.account_id }}/cfd_tunnel"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ cloudflare.tunnel_name }}"
      config_src: cloudflare
    return_content: true
    status_code: 200
  register: cloudflare_tunnel_created
  when: existing_tunnel == {}

- name: Set tunnel facts from create response
  set_fact:
    cloudflare_tunnel_id: "{{ cloudflare_tunnel_created.json.result.id }}"
    cloudflare_tunnel_token: "{{ cloudflare_tunnel_created.json.result.token }}"
  when: cloudflare_tunnel_created is defined and not (cloudflare_tunnel_created.skipped | default(false))

- name: Get tunnel token for existing tunnel
  uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare.account_id }}/cfd_tunnel/{{ existing_tunnel.id }}/token"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: true
  register: existing_tunnel_token_response
  when: existing_tunnel != {}

- name: Set tunnel facts from existing tunnel
  set_fact:
    cloudflare_tunnel_id: "{{ existing_tunnel.id }}"
    cloudflare_tunnel_token: "{{ existing_tunnel_token_response.json.result }}"
  when: existing_tunnel != {}

- name: Build Cloudflare ingress rules
  set_fact:
    cloudflare_ingress_rules: "{{ (cloudflare.domains | map('combine', {'originRequest': {}}) | list) + [{'service': 'http_status:404'}] }}"

- name: Update tunnel ingress configuration via API
  uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare.account_id }}/cfd_tunnel/{{ cloudflare_tunnel_id }}/configurations"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      config:
        ingress: "{{ cloudflare_ingress_rules }}"
    return_content: true
    status_code: 200
  register: tunnel_config_update

- name: Get existing DNS records for configured hostnames
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare.zone_id }}/dns_records?type=CNAME&name={{ item.hostname | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    return_content: true
  loop: "{{ cloudflare.domains }}"
  register: cloudflare_dns_records

- name: Create missing DNS records
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare.zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      type: CNAME
      proxied: true
      name: "{{ item.item.hostname }}"
      content: "{{ cloudflare_tunnel_id }}.cfargotunnel.com"
    return_content: true
    status_code: 200
  loop: "{{ cloudflare_dns_records.results }}"
  when: (item.json.result | length) == 0

- name: Update existing DNS records to current tunnel target
  uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare.zone_id }}/dns_records/{{ item.json.result[0].id }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    body_format: json
    body:
      type: CNAME
      proxied: true
      name: "{{ item.item.hostname }}"
      content: "{{ cloudflare_tunnel_id }}.cfargotunnel.com"
    return_content: true
    status_code: 200
  loop: "{{ cloudflare_dns_records.results }}"
  when:
    - (item.json.result | length) > 0
    - item.json.result[0].content != (cloudflare_tunnel_id ~ '.cfargotunnel.com')

- name: Create cloudflared token environment file
  copy:
    dest: /etc/default/cloudflared
    content: |
      TUNNEL_TOKEN={{ cloudflare_tunnel_token }}
    mode: '0600'
    owner: root
    group: root
  notify: Restart cloudflared

- name: Create cloudflared systemd service for API-managed tunnel
  copy:
    dest: /etc/systemd/system/cloudflared.service
    content: |
      [Unit]
      Description=Cloudflare Tunnel
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      User={{ ansible_user }}
      EnvironmentFile=/etc/default/cloudflared
      ExecStart=/usr/local/bin/cloudflared tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  notify: Restart cloudflared

- name: Enable and start cloudflared service
  include_role:
    name: service_ctl
  vars:
    svc_name: cloudflared
    svc_action: started
    svc_enabled: true

- name: Display Cloudflare tunnel API mode summary
  debug:
    msg:
      tunnel_id: "{{ cloudflare_tunnel_id }}"
      tunnel_name: "{{ cloudflare.tunnel_name }}"
      mode: api
      public_hostnames: "{{ cloudflare.domains | map(attribute='hostname') | list }}"
