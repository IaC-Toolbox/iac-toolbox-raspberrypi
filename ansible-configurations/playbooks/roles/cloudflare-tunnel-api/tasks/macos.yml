---
- name: Validate Cloudflare API mode inputs
  assert:
    that:
      - cloudflare.account_id is defined
      - cloudflare.account_id | length > 0
      - cloudflare.zone_id is defined
      - cloudflare.zone_id | length > 0
      - cloudflare.cloudflare_api_token | length > 0
    fail_msg: "Cloudflare API mode requires cloudflare.account_id, cloudflare.zone_id, and cloudflare.cloudflare_api_token"

- name: Set Cloudflare API token fact
  set_fact:
    cloudflare_api_token: "{{ cloudflare.cloudflare_api_token }}"

- name: Check if cloudflared is already installed
  command: cloudflared --version
  register: cloudflared_check
  changed_when: false
  failed_when: false

- name: Install cloudflared via brew
  community.general.homebrew:
    name: cloudflared
    state: present
  when: cloudflared_check.rc != 0

- name: Verify cloudflared installation
  command: cloudflared --version
  register: cloudflared_version
  changed_when: false

- name: Display cloudflared version
  debug:
    msg: "Cloudflared installed: {{ cloudflared_version.stdout }}"

- include_tasks: configure.yml

- name: Create cloudflared token environment file
  copy:
    dest: "{{ ansible_env.HOME }}/.iac-toolbox/cloudflared/tunnel-token.env"
    content: |
      TUNNEL_TOKEN={{ cloudflare_tunnel_token }}
    mode: "0600"
    owner: "{{ ansible_user }}"
  notify: Restart cloudflared

- name: Ensure LaunchAgents directory exists
  file:
    path: "{{ ansible_env.HOME }}/Library/LaunchAgents"
    state: directory
    mode: "0755"

- name: Create cloudflared launchd plist
  copy:
    dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/com.cloudflare.cloudflared.plist"
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
          <key>Label</key>
          <string>com.cloudflare.cloudflared</string>
          <key>ProgramArguments</key>
          <array>
              <string>/opt/homebrew/bin/cloudflared</string>
              <string>tunnel</string>
              <string>--no-autoupdate</string>
              <string>run</string>
              <string>--token</string>
              <string>{{ cloudflare_tunnel_token }}</string>
          </array>
          <key>RunAtLoad</key>
          <true/>
          <key>KeepAlive</key>
          <true/>
          <key>StandardOutPath</key>
          <string>{{ ansible_env.HOME }}/Library/Logs/cloudflared.out.log</string>
          <key>StandardErrorPath</key>
          <string>{{ ansible_env.HOME }}/Library/Logs/cloudflared.err.log</string>
      </dict>
      </plist>
    mode: "0644"
    owner: "{{ ansible_user }}"
  notify: Restart cloudflared

- name: Unload cloudflared launchd service (for idempotency)
  command: launchctl unload "{{ ansible_env.HOME }}/Library/LaunchAgents/com.cloudflare.cloudflared.plist"
  failed_when: false
  changed_when: false

- name: Load cloudflared launchd service
  command: launchctl load "{{ ansible_env.HOME }}/Library/LaunchAgents/com.cloudflare.cloudflared.plist"
  changed_when: true

- name: Display Cloudflare tunnel API mode summary
  debug:
    msg:
      tunnel_id: "{{ cloudflare_tunnel_id }}"
      tunnel_name: "{{ cloudflare.tunnel_name }}"
      mode: api
      public_hostnames: "{{ cloudflare.domains | map(attribute='hostname') | list }}"
