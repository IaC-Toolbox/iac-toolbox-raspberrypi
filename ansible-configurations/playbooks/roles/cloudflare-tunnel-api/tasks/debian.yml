---
- name: Validate Cloudflare API mode inputs
  assert:
    that:
      - cloudflare.account_id is defined
      - cloudflare.account_id | length > 0
      - cloudflare.zone_id is defined
      - cloudflare.zone_id | length > 0
      - lookup('env', 'CLOUDFLARE_API_TOKEN') | length > 0
    fail_msg: "Cloudflare API mode requires cloudflare.account_id, cloudflare.zone_id, and CLOUDFLARE_API_TOKEN"

- name: Set Cloudflare API token fact
  set_fact:
    cloudflare_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"

- name: Set cloudflared architecture
  set_fact:
    cloudflared_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' if ansible_architecture == 'x86_64' else 'arm' }}"

- name: Download cloudflared binary
  get_url:
    url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-{{ cloudflared_arch }}"
    dest: /usr/local/bin/cloudflared
    mode: '0755'
  become: true

- name: Verify cloudflared is executable
  command: cloudflared --version
  register: cloudflared_version
  changed_when: false

- name: Display cloudflared version
  debug:
    msg: "Cloudflared installed: {{ cloudflared_version.stdout }}"

- include_tasks: configure.yml

- name: Create cloudflared token environment file
  copy:
    dest: /etc/default/cloudflared
    content: |
      TUNNEL_TOKEN={{ cloudflare_tunnel_token }}
    mode: '0600'
    owner: root
    group: root
  become: true
  notify: Restart cloudflared

- name: Deploy cloudflared systemd service
  template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    mode: '0644'
  become: true
  notify: Restart cloudflared

- name: Enable and start cloudflared service
  systemd:
    name: cloudflared
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Display Cloudflare tunnel API mode summary
  debug:
    msg:
      tunnel_id: "{{ cloudflare_tunnel_id }}"
      tunnel_name: "{{ cloudflare.tunnel_name }}"
      mode: api
      public_hostnames: "{{ cloudflare.domains | map(attribute='hostname') | list }}"
