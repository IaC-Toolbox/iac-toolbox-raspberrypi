---
- name: Check if npm is installed
  command: which npm
  register: npm_check
  failed_when: false
  changed_when: false

- name: Install Node.js and npm
  apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: yes
  when: npm_check.rc != 0

- name: Check if openclaw is installed
  command: which openclaw
  register: openclaw_check
  failed_when: false
  changed_when: false

- name: Install openclaw via npm
  npm:
    name: openclaw
    global: yes
    state: latest
  when: openclaw_check.rc != 0

- name: Verify openclaw installation
  command: which openclaw
  register: openclaw_verify
  changed_when: false

- name: Set openclaw path fact
  set_fact:
    openclaw_path: "{{ openclaw_verify.stdout }}"

- name: Display openclaw installation path
  debug:
    msg: "openclaw installed at: {{ openclaw_path }}"

- name: Deploy openclaw systemd service
  template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    mode: '0644'
  notify: Reload systemd

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable openclaw service
  systemd:
    name: openclaw
    enabled: yes

- name: Start openclaw service
  systemd:
    name: openclaw
    state: started

- name: Wait for openclaw service to be active
  command: systemctl is-active openclaw
  register: service_status
  retries: 5
  delay: 2
  until: service_status.stdout == "active"
  changed_when: false

- name: Display openclaw access information
  debug:
    msg:
      - "=========================================="
      - "openclaw successfully deployed!"
      - "=========================================="
      - "openclaw version: npm list -g openclaw --depth=0"
      - "Service status: sudo systemctl status openclaw"
      - "View logs: journalctl -u openclaw -f"
      - ""
      - "Query logs in Grafana Explore:"
      - "  {job=\"systemd\"} |~ \"openclaw\""
      - "  {job=\"systemd\", unit=\"openclaw.service\"}"
      - ""
      - "Manage service:"
      - "  sudo systemctl start openclaw"
      - "  sudo systemctl stop openclaw"
      - "  sudo systemctl restart openclaw"
      - ""
      - "Update openclaw:"
      - "  npm update -g openclaw"
