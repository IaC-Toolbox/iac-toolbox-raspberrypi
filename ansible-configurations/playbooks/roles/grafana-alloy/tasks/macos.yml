---
- name: Set alloy architecture (macOS)
  set_fact:
    alloy_arch: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('arm64', 'arm64') }}"

- name: Create alloy config directory (macOS)
  file:
    path: "{{ alloy_config_dir }}"
    state: directory
    mode: '0755'

- name: Download Grafana Alloy binary (macOS)
  get_url:
    url: "https://github.com/grafana/alloy/releases/download/v{{ alloy_version }}/alloy-darwin-{{ alloy_arch }}.zip"
    dest: "/tmp/alloy-darwin-{{ alloy_arch }}.zip"
    mode: '0644'

- name: Extract Grafana Alloy binary (macOS)
  unarchive:
    src: "/tmp/alloy-darwin-{{ alloy_arch }}.zip"
    dest: /tmp
    remote_src: true

- name: Install Grafana Alloy binary (macOS)
  copy:
    src: "/tmp/alloy-darwin-{{ alloy_arch }}"
    dest: "{{ alloy_install_dir }}/alloy"
    mode: '0755'
    remote_src: true
  notify: Restart grafana-alloy

- name: Deploy Alloy config (macOS)
  template:
    src: config.alloy.j2
    dest: "{{ alloy_config_dir }}/config.alloy"
    mode: '0644'
  notify: Restart grafana-alloy

- name: Deploy Alloy launchd plist (macOS)
  template:
    src: com.grafana.alloy.plist.j2
    dest: "/Library/LaunchDaemons/com.grafana.alloy.plist"
    mode: '0644'
  become: true
  notify: Restart grafana-alloy

- name: Enable and start grafana-alloy service (macOS)
  include_role:
    name: service_ctl
  vars:
    svc_name: com.grafana.alloy
    svc_action: started
    svc_enabled: true

- name: Display grafana-alloy status (macOS)
  debug:
    msg:
      - "Grafana Alloy {{ alloy_version }} is running on macOS"
      - "Alloy UI: http://localhost:{{ alloy_port }}"
      - "Shipping metrics to: {{ alloy_remote_write_url }}"
