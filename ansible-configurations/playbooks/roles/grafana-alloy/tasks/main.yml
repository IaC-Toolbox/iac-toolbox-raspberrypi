---
- name: Ensure alloy base directory exists
  file:
    path: "{{ alloy_base_dir }}"
    state: directory
    mode: '0755'

- name: Deploy Alloy config
  template:
    src: config.alloy.j2
    dest: "{{ alloy_base_dir }}/config.alloy"
    mode: '0644'
  notify: Restart grafana-alloy

- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ alloy_base_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart grafana-alloy

- name: Start Grafana Alloy via docker compose
  shell: docker compose up -d
  args:
    chdir: "{{ alloy_base_dir }}"

- name: Wait for grafana-alloy container to be running
  shell: docker inspect --format="{{ '{{' }}.State.Running{{ '}}' }}" grafana-alloy
  register: alloy_container_state
  retries: 15
  delay: 2
  until: alloy_container_state.stdout == "true"
  changed_when: false

- name: Display grafana-alloy status
  debug:
    msg:
      - "Grafana Alloy {{ alloy_version }} is running"
      - "Alloy UI: http://localhost:{{ alloy_port }}"
      - "Shipping metrics to: {{ alloy_remote_write_url }}"
