---
- name: Update and upgrade packages
  apt:
    upgrade: dist
    update_cache: yes
  become: true

- name: Install lsof
  include_role:
    name: package
  vars:
    pkg_name: lsof

- name: Install python3
  include_role:
    name: package
  vars:
    pkg_name: python3

- name: Install python3-pip
  include_role:
    name: package
  vars:
    pkg_name: python3-pip

- name: Ensure en_US.UTF-8 locale is present
  lineinfile:
    path: /etc/locale.gen
    regexp: "^#?en_US.UTF-8 UTF-8"
    line: "en_US.UTF-8 UTF-8"

- name: Generate locale
  command: locale-gen

- name: Set system locale to en_US.UTF-8
  copy:
    dest: /etc/default/locale
    content: |
      LANG=en_US.UTF-8
      LC_ALL=en_US.UTF-8
      LANGUAGE=en_US.UTF-8
