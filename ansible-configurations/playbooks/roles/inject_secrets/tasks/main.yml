---
- name: Create environment file for Raspberry Pi applications
  copy:
    dest: "{{ secrets.env_file }}"
    content: |
      # Application Secrets - Auto-generated by Ansible
      # DO NOT EDIT MANUALLY - Changes will be overwritten

      {% if openai_api_key is defined %}
      OPENAI_API_KEY={{ openai_api_key }}
      {% endif %}
      {% if database_url is defined %}
      DATABASE_URL={{ database_url }}
      {% endif %}
      {% if api_secret is defined %}
      API_SECRET={{ api_secret }}
      {% endif %}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  no_log: true

- name: Verify secrets file was created
  stat:
    path: "{{ secrets.env_file }}"
  register: secrets_file

- name: Display confirmation
  debug:
    msg: "Secrets file created at {{ secrets.env_file }}"
  when: secrets_file.stat.exists
