---
- name: Merge prometheus config with role defaults
  set_fact:
    prometheus: "{{ prometheus_defaults | combine(prometheus, recursive=True) }}"

- name: Create Prometheus base directory
  file:
    path: "{{ prometheus.base_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Deploy docker-compose configuration
  template:
    src: docker-compose.yml.j2
    dest: "{{ prometheus.base_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus.base_dir }}/prometheus.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Deploy Prometheus recording rules
  template:
    src: macos_compat_rules.yml.j2
    dest: "{{ prometheus.base_dir }}/macos_compat_rules.yml"
    owner: "{{ ansible_user }}"
    mode: '0644'

- name: Pull Prometheus container image
  community.docker.docker_image:
    name: "prom/prometheus:{{ prometheus.version }}"
    source: pull
    docker_host: "{{ active_docker_socket }}"
  become_user: "{{ ansible_user }}"

- name: Start Prometheus via docker compose
  command: docker compose up -d
  args:
    chdir: "{{ prometheus.base_dir }}"
  become_user: "{{ ansible_user }}"

- name: Wait for Prometheus to be healthy
  uri:
    url: "http://localhost:{{ prometheus.port }}/-/healthy"
    method: GET
    status_code: 200
  register: prometheus_health
  retries: 30
  delay: 2
  until: prometheus_health.status == 200

- name: Display Prometheus access information
  debug:
    msg:
      - "=========================================="
      - "Prometheus has been successfully deployed!"
      - "=========================================="
      - "Prometheus URL: http://{{ ansible_host }}:{{ prometheus.port }}"
      - ""
      - "Remote write receiver enabled — app service devices push metrics via Grafana Alloy."
      - ""
      - "Access Prometheus UI via SSH tunnel:"
      - "  ssh -L {{ prometheus.port }}:localhost:{{ prometheus.port }} {{ ansible_user }}@{{ ansible_host }}"
      - "  Then visit: http://localhost:{{ prometheus.port }}"
      - ""
      - "Metrics retention: {{ prometheus.retention }}"
      - "Scrape interval: {{ prometheus.scrape_interval }}"
