---
- name: Set node_exporter architecture
  set_fact:
    node_exporter_arch: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"

- name: Create node_exporter system user
  user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /sbin/nologin
    create_home: false
    comment: "Node Exporter system user"
  become: true

- name: Create node_exporter base directory
  file:
    path: "{{ node_exporter_base_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"
    mode: '0755'
  become: true

- name: Download node_exporter binary
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter archive
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  become: true
  notify: Restart node_exporter

- name: Deploy node_exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter service
  include_role:
    name: service_ctl
  vars:
    svc_name: node_exporter
    svc_action: started
    svc_enabled: true

- name: Wait for node_exporter to be available
  uri:
    url: "http://localhost:{{ node_exporter_port }}/metrics"
    method: GET
    status_code: 200
  register: node_exporter_health
  retries: 30
  delay: 2
  until: node_exporter_health.status == 200

- name: Display node_exporter status
  debug:
    msg:
      - "Node Exporter {{ node_exporter_version }} is running"
      - "Metrics available at: http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
