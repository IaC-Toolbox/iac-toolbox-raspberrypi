---
- name: Set node_exporter architecture (macOS)
  set_fact:
    node_exporter_arch: "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('arm64', 'arm64') }}"

- name: Download node_exporter binary (macOS)
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.darwin-{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.darwin-{{ node_exporter_arch }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter archive (macOS)
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.darwin-{{ node_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install node_exporter binary (macOS)
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.darwin-{{ node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

- name: Deploy node_exporter launchd plist
  template:
    src: com.node_exporter.plist.j2
    dest: "/Library/LaunchDaemons/com.node_exporter.plist"
    mode: '0644'
  become: true
  notify: Restart node_exporter

- name: Enable and start node_exporter service (macOS)
  include_role:
    name: service_ctl
  vars:
    svc_name: com.node_exporter
    svc_action: started
    svc_enabled: true

- name: Wait for node_exporter to be available (macOS)
  uri:
    url: "http://localhost:{{ node_exporter_port }}/metrics"
    method: GET
    status_code: 200
  register: node_exporter_health
  retries: 30
  delay: 2
  until: node_exporter_health.status == 200

- name: Display node_exporter status (macOS)
  debug:
    msg:
      - "Node Exporter {{ node_exporter_version }} is running on macOS"
      - "Metrics available at: http://localhost:{{ node_exporter_port }}/metrics"
