- block:
    - name: Ensure monitoring Docker network exists
      community.docker.docker_network:
        name: monitoring
        state: present

    - name: Create node_exporter base directory
      file:
        path: "{{ node_exporter_base_dir }}"
        state: directory
        mode: "0755"

    - name: Deploy docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ node_exporter_base_dir }}/docker-compose.yml"
        mode: "0644"
      notify: Restart node_exporter

    - name: Pre-pull Node Exporter image
      community.docker.docker_image:
        name: "prom/node-exporter:v{{ node_exporter_version }}"
        source: pull

    - name: Start node-exporter via docker compose
      shell: docker compose up -d
      args:
        chdir: "{{ node_exporter_base_dir }}"

    - name: Wait for node_exporter to be available
      uri:
        url: "http://localhost:{{ node_exporter_port }}/metrics"
        method: GET
        status_code: 200
      register: node_exporter_health
      retries: 30
      delay: 2
      until: node_exporter_health.status == 200

    - name: Display node_exporter status
      debug:
        msg:
          - "Node Exporter {{ node_exporter_version }} is running"
          - "Metrics available at: http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
  tags: [node_exporter]
