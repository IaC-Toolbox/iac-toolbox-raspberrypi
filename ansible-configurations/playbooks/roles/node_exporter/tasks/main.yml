---
- name: Ensure monitoring Docker network exists
  community.docker.docker_network:
    name: monitoring
    state: present

- name: Run Node Exporter container
  community.docker.docker_container:
    name: node-exporter
    image: "prom/node-exporter:v{{ node_exporter_version }}"
    state: started
    restart_policy: always
    networks:
      - name: monitoring
    ports:
      - "{{ node_exporter_port }}:{{ node_exporter_port }}"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--web.listen-address=:{{ node_exporter_port }}"
  notify: Restart node_exporter

- name: Wait for node_exporter to be available
  uri:
    url: "http://localhost:{{ node_exporter_port }}/metrics"
    method: GET
    status_code: 200
  register: node_exporter_health
  retries: 30
  delay: 2
  until: node_exporter_health.status == 200

- name: Display node_exporter status
  debug:
    msg:
      - "Node Exporter {{ node_exporter_version }} is running"
      - "Metrics available at: http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
