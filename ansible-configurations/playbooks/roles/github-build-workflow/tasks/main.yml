---
- name: Validate github_build_workflow config
  assert:
    that:
      - github_build_workflow.docker_hub_username | length > 0
      - github_build_workflow.docker_image_name | length > 0
    fail_msg: "docker_hub_username and docker_image_name must be set"

- name: Ensure .github/workflows directory exists
  file:
    path: "{{ project_root }}/.github/workflows"
    state: directory
    mode: "0755"

- name: Deploy GitHub Actions build workflow
  template:
    src: build.yml.j2
    dest: "{{ project_root }}/.github/workflows/build.yml"
    mode: "0644"

- name: Display workflow deploy info
  debug:
    msg:
      - "GitHub Actions workflow deployed to:"
      - "  {{ project_root }}/.github/workflows/build.yml"
      - "Required GitHub Secrets:"
      - "  DOCKER_USERNAME — your Docker Hub username"
      - "  DOCKER_PASSWORD — your Docker Hub token"
