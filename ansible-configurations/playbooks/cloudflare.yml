---
# ============================================
# IaC Toolbox - Cloudflare Playbook
# ============================================
# Deploys cloudflare-tunnel (oauth mode) and cloudflare-tunnel-api (api mode).

- name: Deploy Cloudflare Tunnel
  hosts: all
  become: false
  roles:
    - role: cloudflare-tunnel
      when:
        - cloudflare is defined
        - cloudflare.enabled
        - (cloudflare.mode | default('oauth')) == 'oauth'

    - role: cloudflare-tunnel-api
      when:
        - cloudflare is defined
        - cloudflare.enabled
        - (cloudflare.mode | default('oauth')) == 'api'
