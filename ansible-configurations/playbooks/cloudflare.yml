---
- name: Deploy Cloudflare Tunnel
  hosts: all
  become: false
  pre_tasks:
    - name: Validate connection to target host
      ping:

    - name: Check Python installation
      command: python3 --version
      register: python_version
      changed_when: false

    - name: Gather system facts
      setup:

    - name: Display target system information
      debug:
        msg: |
          Target: {{ ansible_host }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}

  roles:
    - role: common

    - role: setup
      when: ansible_os_family != "Darwin"

    - role: docker

    - role: cloudflare-tunnel
      when: (cloudflare.mode | default('oauth')) == 'oauth'

    - role: cloudflare-tunnel-api
      when: (cloudflare.mode | default('oauth')) == 'api'

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          Cloudflare tunnel deployed successfully.
          - Mode: {{ cloudflare.mode | default('oauth') }}
          - Verify: sudo systemctl status cloudflared
