---
# ============================================
# IaC Toolbox - Observability Agent Playbook
# ============================================
# Deploys only the agent-side observability stack in a single Ansible run.
# Intended for "spoke" nodes that push metrics to a remote Prometheus/Grafana
# rather than hosting their own platform.
# common runs once; all service roles are gated by their when conditions.
#
# Deploy order (dependency order):
#   common → node_exporter → grafana-alloy → cadvisor
#
# Flags driven by iac-toolbox.yml (passed via --extra-vars):
#   cadvisor.enabled: false    — skip cAdvisor (default: deploy)
#   node_exporter.enabled: false — skip Node Exporter (default: skip unless defined)
#   grafana_alloy.enabled: false — skip Grafana Alloy (default: skip unless defined)

- import_playbook: common.yml

- name: Deploy Observability Agent
  hosts: all
  become: false
  roles:
    - role: node_exporter
      when: node_exporter is defined and node_exporter.enabled

    - role: grafana-alloy
      when: grafana_alloy is defined and grafana_alloy.enabled

    - role: cadvisor
      when: cadvisor is not defined or cadvisor.enabled | default(true)

    - role: threshold-alerts
      when: threshold_alerts is defined and threshold_alerts.enabled | default(false)
